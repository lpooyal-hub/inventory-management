version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8021:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/inventory.db

  frontend:
    build:
      context: ./frontend
    ports:
      - "5175:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8021
    depends_on:
      - backend
